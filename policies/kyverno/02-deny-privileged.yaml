# =============================================================================
# 02-deny-privileged.yaml
# Politique Kyverno : rejet des conteneurs privileged
#
# Hypothèse testée : H3
# Scénario couvert : E (pod avec configuration insecure)
# MITRE ATT&CK    : T1611 — Escape to Host
#
# Note : les namespaces kube-system, monitoring et falco sont exclus
# car leurs composants (node-exporter, Falco DaemonSet) requièrent
# légitimement hostPID/hostNetwork pour collecter métriques et événements kernel.
# La politique est donc ciblée sur les namespaces applicatifs (app, default).
# =============================================================================

apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: deny-privileged-containers
  annotations:
    policies.kyverno.io/title: "Interdiction des conteneurs privileged"
    policies.kyverno.io/category: "Pod Security"
    policies.kyverno.io/severity: "critical"
    policies.kyverno.io/description: >
      Interdit le déploiement de conteneurs avec securityContext.privileged: true,
      hostPID: true, hostIPC: true, ou le montage de /var/run/docker.sock.
      Ces configurations permettent une évasion vers l'hôte (container escape).
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    # Règle 1 : interdire privileged: true
    - name: deny-privileged-flag
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - monitoring
                - falco
                - kyverno
      validate:
        message: "Les conteneurs privileged sont interdits (risque T1611 Escape to Host)."
        pattern:
          spec:
            =(initContainers):
              - =(securityContext):
                  =(privileged): "false"
            containers:
              - =(securityContext):
                  =(privileged): "false"

    # Règle 2 : interdire hostPID et hostIPC
    - name: deny-host-pid-ipc
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - monitoring
                - falco
                - kyverno
      validate:
        message: "hostPID et hostIPC sont interdits."
        pattern:
          spec:
            =(hostPID): "false"
            =(hostIPC): "false"

    # Règle 3 : interdire le montage de docker.sock
    # S'applique à tous les namespaces sauf kube-system
    - name: deny-docker-sock-mount
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
      validate:
        message: "Le montage de /var/run/docker.sock est interdit."
        pattern:
          spec:
            =(volumes):
              - =(hostPath):
                  =(path): "!/var/run/docker.sock"
