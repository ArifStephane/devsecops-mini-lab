# =============================================================================
# 01-verify-image-signature.yaml
# Politique Kyverno : vérification de la signature Cosign des images
#
# Hypothèse testée : H3
# Scénario couvert : B (image non signée)
# MITRE ATT&CK    : T1195 — Supply Chain Compromise
# =============================================================================

apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signature
  annotations:
    policies.kyverno.io/title: "Vérification de signature Cosign"
    policies.kyverno.io/category: "Supply Chain Security"
    policies.kyverno.io/severity: "high"
    policies.kyverno.io/description: >
      Exige que toutes les images déployées dans le namespace 'app'
      soient signées avec Cosign (mode keyless) et que la signature
      soit vérifiable via Sigstore Rekor. Les images non signées
      ou dont la signature est invalide sont rejetées à l'admission.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-image-signature
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - app
      verifyImages:
        - imageReferences:
            - "ghcr.io/*/target-api*"
          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: "https://github.com/ArifStephane/devsecops-mini-lab/.github/workflows/pipeline.yml@refs/heads/main"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: "https://rekor.sigstore.dev"
          mutateDigest: true
          verifyDigest: true
          required: true
